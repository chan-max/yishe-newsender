name: Hotsearch Every 6 Hours

on:
  schedule:
    # 每六个小时执行一次（UTC 时间）
    # 0, 6, 12, 18 点
    - cron: '0 */6 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        # use the latest stable major version; v20 tag does not exist
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run hotsearch script
        run: |
          # the CLI entrypoint fetches hotsearch data and sends to Feishu
          npm run cli
